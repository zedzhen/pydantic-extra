version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      timezone: "Europe/Moscow"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
      timezone: "Europe/Moscow"
    ignore:
      - dependency-name: "sphinx-autobuild"
        version: [ "<2025.8" ]
      - dependency-name: "Sphinx"
        version: [ "<9" ]

  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "daily"
      timezone: "Europe/Moscow"
