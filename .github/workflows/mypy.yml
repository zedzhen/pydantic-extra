name: mypy

on:
  pull_request:
  workflow_dispatch:
  push:
    branches: ["master"]

jobs:
  build:
    name: mypy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.14"

      - name: Update pip
        run: python -m pip install pip -U

      - name: Install dependencies
        run: python -m pip install --group types

      - name: run mypy
        run: python3 tools/mypy.py
