[build-system]
requires = ["setuptools>=81"]

[project]
name = "pydantic-extra"
description = "Готовые модели pydantic для частых задач"
readme = "readme.md"
requires-python = ">=3.10"
license = { file = "LICENSE" }
authors = [
    { name = "Ярыкин Евгений", email = "pypi@zedzhen.ru" }
]
dependencies = ['pydantic~=2.10', 'typing-extensions~=4.14']
dynamic = ["version"]

[project.urls]
source = "https://github.com/zedzhen/pydantic-extra"

[project.optional-dependencies]
db = ['sqlalchemy~=2.0']
db_full = ['pymysql~=1.1,!=1.1.0']
adb_full = [
    'aiosqlite>=0.20,<0.23',
    'aiomysql~=0.3.0',
]
test = ['pytest~=9.0']
dev = [
    'black~=26.5',
    'isort~=8.0',
    "build==1.5.*",
    "pre-commit~=4.6",
]

[tool.setuptools.dynamic]
version = { attr = "pydantic_extra.__version__" }

[tool.pytest]
pythonpath = ["src"]
testpaths = ["tests"]
addopts = ["--import-mode=importlib"]
minversion = "9.0"

[tool.black]
line-length = 120

[tool.isort]
profile = "black"
line_length = 120
combine_as_imports = true
